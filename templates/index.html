<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wake on LAN — Home Lab</title>
  <meta name="description" content="Painel de controle para ligar remotamente o PC via Wake on LAN." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --surface:   #0d1117;
      --surface2:  #161b22;
      --border:    #21262d;
      --green:     #00ff88;
      --green-dim: #00c96a;
      --green-glow:rgba(0,255,136,.18);
      --red:       #ff5555;
      --orange:    #ff8c42;
      --orange-dim:#e06820;
      --orange-glow:rgba(255,140,66,.18);
      --text:      #e6edf3;
      --muted:     #8b949e;
      --mono:      'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── animated grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove { to { background-position: 40px 40px; } }

    /* ── layout ── */
    .page {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem;
    }

    /* ── header ── */
    header {
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--green);
      border: 1px solid var(--green-dim);
      border-radius: 999px;
      padding: .3rem .8rem;
      margin-bottom: 1rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(0,255,136,.05);
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--text);
    }
    h1 span { color: var(--green); }

    .subtitle {
      margin-top: .5rem;
      font-size: .9rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      text-align: center;
      width: min(420px, 100%);
      position: relative;
      box-shadow: 0 0 0 1px rgba(0,255,136,.04), 0 20px 60px rgba(0,0,0,.6);
      transition: box-shadow .3s;
    }
    .card:hover {
      box-shadow: 0 0 0 1px rgba(0,255,136,.1), 0 24px 70px rgba(0,0,0,.7);
    }

    /* ── MAC info ── */
    .mac-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 2.2rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem .9rem;
    }
    .mac-row svg { flex-shrink: 0; }

    /* ── button row (wake + shutdown side by side) ── */
    .btn-wrap {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 1rem;
    }

    .btn-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
    }

    /* ── shared power-button base ── */
    .pow-btn {
      position: relative;
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 2px solid;
      cursor: pointer;
      outline: none;
      transition: border-color .25s, transform .15s, box-shadow .25s;
    }
    .pow-btn::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.06);
      animation: ringPulse 3s ease-out infinite;
    }
    .pow-btn:active { transform: scale(.97); }

    /* ── wake button (green) ── */
    #wol-btn {
      border-color: var(--green-dim);
      background: radial-gradient(circle at 50% 40%, #0f2a1a 0%, #080c10 70%);
      box-shadow:
        0 0 0 8px rgba(0,255,136,.04),
        0 0 30px rgba(0,255,136,.08),
        inset 0 2px 8px rgba(0,0,0,.4);
    }
    #wol-btn:hover {
      border-color: var(--green);
      box-shadow:
        0 0 0 10px rgba(0,255,136,.08),
        0 0 50px rgba(0,255,136,.2),
        inset 0 2px 8px rgba(0,0,0,.4);
      transform: scale(1.04);
    }
    #wol-btn.loading { border-color: var(--green); animation: spin 1.2s linear infinite; }
    #wol-btn.success { border-color: var(--green); }
    #wol-btn.error   { border-color: var(--red); }

    /* ── shutdown button (orange/red) ── */
    #shutdown-btn {
      border-color: var(--orange-dim);
      background: radial-gradient(circle at 50% 40%, #2a1200 0%, #080c10 70%);
      box-shadow:
        0 0 0 8px rgba(255,140,66,.04),
        0 0 30px rgba(255,140,66,.08),
        inset 0 2px 8px rgba(0,0,0,.4);
    }
    #shutdown-btn:hover {
      border-color: var(--orange);
      box-shadow:
        0 0 0 10px rgba(255,140,66,.08),
        0 0 50px rgba(255,140,66,.22),
        inset 0 2px 8px rgba(0,0,0,.4);
      transform: scale(1.04);
    }
    #shutdown-btn.loading { border-color: var(--orange); animation: spin 1.2s linear infinite; }
    #shutdown-btn.success { border-color: var(--orange); }
    #shutdown-btn.error   { border-color: var(--red); }

    /* confirmation overlay ── */
    #confirm-overlay {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: rgba(8,12,16,.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      backdrop-filter: blur(4px);
    }
    #confirm-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .confirm-text {
      font-size: .9rem;
      color: var(--text);
      text-align: center;
      line-height: 1.5;
    }
    .confirm-text strong { color: var(--orange); }
    .confirm-actions { display: flex; gap: .8rem; }
    .confirm-actions button {
      padding: .45rem 1.1rem;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      letter-spacing: .04em;
      transition: opacity .2s, transform .1s;
    }
    .confirm-actions button:active { transform: scale(.96); }
    #confirm-yes {
      background: rgba(255,140,66,.15);
      border-color: var(--orange-dim);
      color: var(--orange);
    }
    #confirm-yes:hover { background: rgba(255,140,66,.25); }
    #confirm-no {
      background: rgba(139,148,158,.08);
      border-color: var(--border);
      color: var(--muted);
    }
    #confirm-no:hover { background: rgba(139,148,158,.16); }

    /* ── power icons ── */
    .power-icon {
      width: 44px; height: 44px;
      transition: filter .3s;
    }
    #wol-btn:hover      .power-icon { filter: drop-shadow(0 0 8px var(--green)); }
    #wol-btn.success    .power-icon { filter: drop-shadow(0 0 8px var(--green)); }
    #wol-btn.error      .power-icon { filter: drop-shadow(0 0 8px var(--red)); }
    #shutdown-btn:hover      .power-icon { filter: drop-shadow(0 0 8px var(--orange)); }
    #shutdown-btn.success    .power-icon { filter: drop-shadow(0 0 8px var(--orange)); }
    #shutdown-btn.error      .power-icon { filter: drop-shadow(0 0 8px var(--red)); }

    @keyframes ringPulse {
      0%   { transform: scale(1);   opacity:.6 }
      100% { transform: scale(1.3); opacity:0  }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── labels ── */
    .btn-label {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color .3s;
    }
    .btn-col:has(#wol-btn:hover)      .btn-label,
    .btn-col:has(#wol-btn.success)    .btn-label { color: var(--green); }
    .btn-col:has(#shutdown-btn:hover)  .btn-label,
    .btn-col:has(#shutdown-btn.success).btn-label { color: var(--orange); }

    /* ── status banner ── */
    #status {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      font-size: .85rem;
      font-weight: 500;
      border-radius: 10px;
      padding: .5rem 1rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .3s, transform .3s, background .3s, color .3s;
    }
    #status.show { opacity: 1; transform: translateY(0); }
    #status.success { background: rgba(0,255,136,.1); color: var(--green); border: 1px solid rgba(0,255,136,.2); }
    #status.error   { background: rgba(255,85,85,.1);  color: var(--red);   border: 1px solid rgba(255,85,85,.2);  }

    /* ── log ── */
    .log-section { width: min(500px, 100%); }
    .log-title {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: .5rem;
      font-family: var(--mono);
    }
    #log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .8rem 1rem;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      max-height: 110px;
      overflow-y: auto;
      list-style: none;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #log li { padding: .15rem 0; border-bottom: 1px solid rgba(255,255,255,.03); }
    #log li:last-child { border-bottom: none; }
    #log li.ok  { color: var(--green); }
    #log li.err { color: var(--red); }

    footer {
      font-size: .7rem;
      color: var(--muted);
      font-family: var(--mono);
      opacity: .5;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="badge">
      <span class="badge-dot"></span>
      Home Lab — CasaOS
    </div>
    <h1>Wake <span>on LAN</span></h1>
    <p class="subtitle">Ligue seu desktop remotamente com um clique</p>
  </header>

  <div class="card">
    <!-- confirmation overlay for shutdown -->
    <div id="confirm-overlay">
      <div class="confirm-text">Tem certeza que deseja<br><strong>desligar o PC?</strong></div>
      <div class="confirm-actions">
        <button id="confirm-yes">Sim, desligar</button>
        <button id="confirm-no">Cancelar</button>
      </div>
    </div>

    <div class="mac-row">
      <!-- computer icon -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      {{ mac }}
    </div>

    <div class="btn-wrap">
      <!-- Wake button -->
      <div class="btn-col">
        <button id="wol-btn" class="pow-btn" aria-label="Ligar PC via Wake on LAN">
          <svg class="power-icon" viewBox="0 0 48 48" fill="none"
               stroke="var(--green)" stroke-width="3.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M24 10v14"/>
            <path d="M15.4 14.4A13 13 0 1 0 32.6 14.4"/>
          </svg>
        </button>
        <span class="btn-label">Ligar</span>
      </div>

      <!-- Shutdown button -->
      <div class="btn-col">
        <button id="shutdown-btn" class="pow-btn" aria-label="Desligar PC remotamente">
          <svg class="power-icon" viewBox="0 0 48 48" fill="none"
               stroke="var(--orange)" stroke-width="3.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M24 10v14"/>
            <path d="M15.4 14.4A13 13 0 1 0 32.6 14.4"/>
            <line x1="16" y1="16" x2="32" y2="32" stroke="var(--orange)" stroke-width="3" />
            <line x1="32" y1="16" x2="16" y2="32" stroke="var(--orange)" stroke-width="3" />
          </svg>
        </button>
        <span class="btn-label">Desligar</span>
      </div>
    </div>

    <div id="status" role="alert"></div>
  </div>

  <div class="log-section">
    <p class="log-title">▸ Histórico de envios</p>
    <ul id="log">
      <li style="color:rgba(139,148,158,.4)">— aguardando primeira ação —</li>
    </ul>
  </div>

  <footer>button-wol · flask · wakeonlan</footer>
</div>

<script>
  const btn             = document.getElementById('wol-btn');
  const shutdownBtn     = document.getElementById('shutdown-btn');
  const status          = document.getElementById('status');
  const log             = document.getElementById('log');
  const confirmOverlay  = document.getElementById('confirm-overlay');
  const confirmYes      = document.getElementById('confirm-yes');
  const confirmNo       = document.getElementById('confirm-no');

  function addLog(msg, ok) {
    const now = new Date().toLocaleTimeString('pt-BR');
    const li = document.createElement('li');
    li.className = ok ? 'ok' : 'err';
    li.textContent = `[${now}] ${msg}`;
    if (log.children.length === 1 && log.children[0].style.color) log.innerHTML = '';
    log.prepend(li);
    while (log.children.length > 20) log.removeChild(log.lastChild);
  }

  function setStatus(msg, type) {
    status.textContent = msg;
    status.className = `show ${type}`;
  }

  async function callEndpoint(endpoint, triggerBtn) {
    if (triggerBtn.classList.contains('loading')) return;
    triggerBtn.classList.add('loading');
    status.className = '';
    status.textContent = '';

    try {
      const res  = await fetch(endpoint, { method: 'POST' });
      const data = await res.json();
      triggerBtn.classList.remove('loading');

      if (res.ok) {
        triggerBtn.classList.add('success');
        setStatus('✓ ' + data.message, 'success');
        addLog(data.message, true);
        setTimeout(() => triggerBtn.classList.remove('success'), 3000);
      } else {
        triggerBtn.classList.add('error');
        setStatus('✗ ' + data.message, 'error');
        addLog('Erro: ' + data.message, false);
        setTimeout(() => triggerBtn.classList.remove('error'), 3000);
      }
    } catch (err) {
      triggerBtn.classList.remove('loading');
      triggerBtn.classList.add('error');
      setStatus('✗ Falha na conexão com o servidor', 'error');
      addLog('Falha na conexão', false);
      setTimeout(() => triggerBtn.classList.remove('error'), 3000);
    }
  }

  /* ── Wake button ── */
  btn.addEventListener('click', () => callEndpoint('/wake', btn));

  /* ── Shutdown button — show confirmation first ── */
  shutdownBtn.addEventListener('click', () => {
    if (shutdownBtn.classList.contains('loading')) return;
    confirmOverlay.classList.add('visible');
  });

  confirmYes.addEventListener('click', () => {
    confirmOverlay.classList.remove('visible');
    callEndpoint('/shutdown', shutdownBtn);
  });

  confirmNo.addEventListener('click', () => {
    confirmOverlay.classList.remove('visible');
  });
</script>
</body>
</html>
